<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - Nemotron Ultra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1e1e2e; color: #cdd6f4;
      display: flex; justify-content: center; align-items: center; height: 100vh;
    }
    .chat-container {
      width: 100%; max-width: 800px; height: 100vh;
      display: flex; flex-direction: column; background: #1e1e2e; overflow: hidden;
    }
    .chat-header {
      background: #11111b; padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #313244;
    }
    .chat-header h1 { font-size: 20px; font-weight: 600; color: #cdd6f4; }
    .model-badge { background: #313244; color: #a6adc8; font-size: 13px; padding: 6px 14px; border-radius: 20px; font-weight: 500; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .message { display: flex; gap: 12px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 16px; flex-shrink: 0;
    }
    .bot-avatar { background: #45475a; color: #cdd6f4; }
    .user-avatar { background: #cba6f7; color: #1e1e2e; }
    .message-content {
      background: #313244; padding: 14px 18px; border-radius: 18px;
      font-size: 15px; line-height: 1.5; word-wrap: break-word;
    }
    .message.user .message-content { background: #45475a; color: #ffffff; }
    .message.bot .message-content { background: #313244; color: #cdd6f4; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; }
    .typing-indicator span {
      width: 8px; height: 8px; background: #a6adc8; border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .chat-input-area {
      padding: 16px 24px 24px; background: #11111b;
      border-top: 1px solid #313244; display: flex; gap: 12px;
    }
    #userInput {
      flex: 1; padding: 14px 18px; background: #313244;
      border: 1px solid #45475a; border-radius: 30px; color: #cdd6f4;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    #userInput:focus { border-color: #cba6f7; }
    #sendButton {
      background: #cba6f7; border: none; color: #1e1e2e;
      font-weight: 600; padding: 14px 24px; border-radius: 30px;
      cursor: pointer; font-size: 15px; transition: background 0.2s;
    }
    #sendButton:hover { background: #b4befe; }
    #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { background: #f38ba8 !important; color: #1e1e2e !important; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>✨ Nemotron Ultra Chat</h1>
      <span class="model-badge" id="modelBadge">nvidia/llama-3.1-nemotron-ultra-8b</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="avatar bot-avatar">🤖</div>
        <div class="message-content">
          Hello! I'm powered by Nemotron Ultra via OpenRouter. How can I help you today?
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autofocus />
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // ========== CONFIGURATION ==========
    const OPENROUTER_API_KEY = "YOUR_NEW_API_KEY_HERE";  // <-- PASTE YOUR KEY
    // Change this to the exact model ID from OpenRouter
    const MODEL_ID = "nvidia/nemotron-3-ultra-550b-a55b:free";
    // Optional test with a free model if you want to verify the API key
    // const MODEL_ID = "meta-llama/llama-3.2-3b-instruct";

    // ========== DOM ELEMENTS ==========
    const chatMessages = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");
    const modelBadge = document.getElementById("modelBadge");
    modelBadge.textContent = MODEL_ID;

    // ========== STATE ==========
    let messages = [
      {
        role: "assistant",
        content: "Hello! I'm powered by Nemotron Ultra via OpenRouter. How can I help you today?",
      },
    ];

    // ========== FUNCTIONS ==========
    function addMessage(role, text, isError = false) {
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", role);

      const avatar = document.createElement("div");
      avatar.classList.add("avatar", role === "user" ? "user-avatar" : "bot-avatar");
      avatar.textContent = role === "user" ? "👤" : "🤖";

      const contentDiv = document.createElement("div");
      contentDiv.classList.add("message-content");
      if (isError) contentDiv.classList.add("error");

      // Use marked.js if available for bot messages
      if (role === "bot" && !isError && typeof marked !== "undefined") {
        contentDiv.innerHTML = marked.parse(text);
      } else {
        contentDiv.textContent = text;
      }

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return contentDiv;
    }

    function showTypingIndicator() {
      const typingDiv = document.createElement("div");
      typingDiv.classList.add("message", "bot");
      typingDiv.id = "typingIndicator";

      const avatar = document.createElement("div");
      avatar.classList.add("avatar", "bot-avatar");
      avatar.textContent = "🤖";

      const content = document.createElement("div");
      content.classList.add("message-content");
      content.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      typingDiv.appendChild(avatar);
      typingDiv.appendChild(content);
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById("typingIndicator");
      if (indicator) indicator.remove();
    }

    async function sendMessage() {
      const userText = userInput.value.trim();
      if (!userText) return;

      // Disable UI
      userInput.disabled = true;
      sendButton.disabled = true;

      // Add user message
      addMessage("user", userText);
      messages.push({ role: "user", content: userText });
      userInput.value = "";

      showTypingIndicator();

      console.log("Sending to OpenRouter:", MODEL_ID);

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
            // Optional: add HTTP-Referer and X-Title headers for OpenRouter rankings
            "HTTP-Referer": window.location.href,
            "X-Title": "Nemotron Ultra Chat",
          },
          body: JSON.stringify({
            model: MODEL_ID,
            messages: messages,
            temperature: 0.7,
            max_tokens: 2048,
          }),
        });

        hideTypingIndicator();

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        const botReply = data.choices[0].message.content;

        addMessage("bot", botReply);
        messages.push({ role: "assistant", content: botReply });

        console.log("Reply received successfully.");
      } catch (error) {
        hideTypingIndicator();
        console.error("API Error:", error);
        addMessage("bot", `⚠️ Error: ${error.message}`, true);
        // Remove the user message from history because the request failed
        messages.pop();
      } finally {
        userInput.disabled = false;
        sendButton.disabled = false;
        userInput.focus();
      }
    }

    // ========== EVENT LISTENERS ==========
    sendButton.addEventListener("click", () => {
      console.log("Send button clicked");
      sendMessage();
    });

    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        console.log("Enter key pressed");
        sendMessage();
      }
    });

    console.log("Chat app initialized. Model:", MODEL_ID);
  </script>
</body>
</html>
