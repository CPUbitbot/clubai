<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - Nemotron Ultra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1e1e2e; color: #cdd6f4;
      display: flex; justify-content: center; align-items: center; height: 100vh;
    }
    .chat-container {
      width: 100%; max-width: 800px; height: 100vh;
      display: flex; flex-direction: column; background: #1e1e2e; overflow: hidden;
    }
    .chat-header {
      background: #11111b; padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #313244;
    }
    .chat-header h1 { font-size: 20px; font-weight: 600; color: #cdd6f4; }
    .model-badge { background: #313244; color: #a6adc8; font-size: 13px; padding: 6px 14px; border-radius: 20px; font-weight: 500; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .message { display: flex; gap: 12px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 16px; flex-shrink: 0;
    }
    .bot-avatar { background: #45475a; color: #cdd6f4; }
    .user-avatar { background: #cba6f7; color: #1e1e2e; }
    .message-content {
      background: #313244; padding: 14px 18px; border-radius: 18px;
      font-size: 15px; line-height: 1.5; word-wrap: break-word;
    }
    .message.user .message-content { background: #45475a; color: #ffffff; }
    .message.bot .message-content { background: #313244; color: #cdd6f4; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; }
    .typing-indicator span {
      width: 8px; height: 8px; background: #a6adc8; border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    .chat-input-area {
      padding: 16px 24px 24px; background: #11111b;
      border-top: 1px solid #313244; display: flex; gap: 12px;
    }
    #userInput {
      flex: 1; padding: 14px 18px; background: #313244;
      border: 1px solid #45475a; border-radius: 30px; color: #cdd6f4;
      font-size: 15px; outline: none; transition: border 0.2s;
    }
    #userInput:focus { border-color: #cba6f7; }
    #sendButton {
      background: #cba6f7; border: none; color: #1e1e2e;
      font-weight: 600; padding: 14px 24px; border-radius: 30px;
      cursor: pointer; font-size: 15px; transition: background 0.2s;
    }
    #sendButton:hover { background: #b4befe; }
    #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { background: #f38ba8 !important; color: #1e1e2e !important; }
    .warning-box {
      background: #f38ba8; color: #1e1e2e; padding: 10px; margin: 10px 0;
      border-radius: 8px; font-weight: bold; text-align: center;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>✨ Nemotron Ultra Chat</h1>
      <span class="model-badge" id="modelBadge">nvidia/llama-3.1-nemotron-ultra-8b</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="avatar bot-avatar">🤖</div>
        <div class="message-content">
          Hello! I'm powered by Nemotron Ultra via OpenRouter. How can I help you today?
        </div>
      </div>
      <!-- If key is missing, a warning will appear here -->
    </div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autofocus />
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // ========== 🔑 REPLACE THIS WITH YOUR NEW API KEY ==========
    const OPENROUTER_API_KEY = "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";
    const MODEL_ID = "nvidia/llama-3.1-nemotron-ultra-8b";

    // Show a warning if the key is still the placeholder
    if (OPENROUTER_API_KEY === "YOUR_NEW_API_KEY_HERE" || OPENROUTER_API_KEY === "") {
      const warningDiv = document.createElement("div");
      warningDiv.className = "warning-box";
      warningDiv.textContent = "⚠️ You forgot to add your OpenRouter API key! Open the HTML file and paste your key.";
      document.getElementById("chatMessages").prepend(warningDiv);
    }

    const chatMessages = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");
    document.getElementById("modelBadge").textContent = MODEL_ID;

    let messages = [
      {
        role: "assistant",
        content: "Hello! I'm powered by Nemotron Ultra via OpenRouter. How can I help you today?",
      },
    ];

    function addMessage(role, text, isError = false) {
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", role);
      const avatar = document.createElement("div");
      avatar.classList.add("avatar", role === "user" ? "user-avatar" : "bot-avatar");
      avatar.textContent = role === "user" ? "👤" : "🤖";
      const contentDiv = document.createElement("div");
      contentDiv.classList.add("message-content");
      if (isError) contentDiv.classList.add("error");
      if (role === "bot" && !isError && typeof marked !== "undefined") {
        contentDiv.innerHTML = marked.parse(text);
      } else {
        contentDiv.textContent = text;
      }
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return contentDiv;
    }

    function showTypingIndicator() {
      const typingDiv = document.createElement("div");
      typingDiv.classList.add("message", "bot");
      typingDiv.id = "typingIndicator";
      const avatar = document.createElement("div");
      avatar.classList.add("avatar", "bot-avatar");
      avatar.textContent = "🤖";
      const content = document.createElement("div");
      content.classList.add("message-content");
      content.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      typingDiv.appendChild(avatar);
      typingDiv.appendChild(content);
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById("typingIndicator");
      if (indicator) indicator.remove();
    }

    async function sendMessage() {
      // Check for missing key before sending
      if (OPENROUTER_API_KEY === "YOUR_NEW_API_KEY_HERE" || OPENROUTER_API_KEY === "") {
        addMessage("bot", "⚠️ Missing API key! Please add your key in the code.", true);
        return;
      }

      const userText = userInput.value.trim();
      if (!userText) return;

      userInput.disabled = true;
      sendButton.disabled = true;

      addMessage("user", userText);
      messages.push({ role: "user", content: userText });
      userInput.value = "";

      showTypingIndicator();

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
            "HTTP-Referer": window.location.href,
            "X-Title": "Nemotron Ultra Chat",
          },
          body: JSON.stringify({
            model: MODEL_ID,
            messages: messages,
            temperature: 0.7,
            max_tokens: 2048,
          }),
        });

        hideTypingIndicator();

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        const botReply = data.choices[0].message.content;

        addMessage("bot", botReply);
        messages.push({ role: "assistant", content: botReply });
      } catch (error) {
        hideTypingIndicator();
        addMessage("bot", `⚠️ Error: ${error.message}`, true);
        messages.pop(); // remove user message that caused failure
      } finally {
        userInput.disabled = false;
        sendButton.disabled = false;
        userInput.focus();
      }
    }

    sendButton.addEventListener("click", sendMessage);
    userInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
